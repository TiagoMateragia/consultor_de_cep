<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultor de CEP</title>
    <link rel="stylesheet" href="estilos/style.css">
</head>
<body>
    <div id="cabecalho">
            <img class="logo" src="imagens/logo.png" alt="Logo de Consultor de CEP">

            <div id="trilho">
                <div class="botao_tema"></div>
            </div>
    </div>

    <div id="bloco_geral">
        <div class="bloco_conteudo">
            <input type="number" placeholder="Consulte seu CEP">
            <button>Consultar</button>
        </div>

        <div class="bloco_resultado">
            <p class="logradouro"></p>

            <p class="complemento"></p>

            <p class="unidade"></p>

            <p class="bairro"></p>

            <p class="localidade"></p>

            <p class="uf"></p>

            <p class="estado"></p>

            <p class="regiao"></p>

            <p class="ibge"></p>

            <p class="gia"></p>

            <p class="ddd"></p>
            
            <p class="siafi"></p>
        </div>
    </div>

    <script src="javascript/consultar.js"></script>
</body>
</html>
