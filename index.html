<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultor de CEP</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="shortcut icon" href="imagens/logo_pagina.ico" type="image/x-icon">
</head>
<body>
    <div id="cabecalho">
            <img class="logo" src="imagens/logo_claro.png" alt="Logo de Consultor de CEP">

            <div id="trilho">
                <div class="botao_tema"></div>
            </div>
    </div>

    <div id="bloco_geral">
        <div class="bloco_conteudo">
            <input class="digitar_cep" type="text" maxlength="9" placeholder="Consulte seu CEP">
            <button class="botao_consultar" onclick="consultar_cep()">Consultar</button>
        </div>

        <div class="bloco_resultado">
            <div class="bloco_erro">
                <p class="msg_erro"></p>
            </div>
            
            <div class="linha1">
                <p class="logradouro"></p>

                <p class="complemento"></p>

                <p class="unidade"></p>
            </div>
            
            <div class="linha2">
                <p class="bairro"></p>

                <p class="localidade"></p>

                <p class="uf"></p>
            </div>
           
            <div class="linha3">
                <p class="estado"></p>

                <p class="regiao"></p>

                <p class="ibge"></p>
            </div>
            
            <div class="linha4">
                <p class="gia"></p>

                <p class="ddd"></p>
                
                <p class="siafi"></p>
            </div>
        </div>
    </div>

    <script src="javascript/consultar.js"></script>
</body>
</html>
